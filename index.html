<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alvas & Lailas Einhorn-Wasser-Sommerfest 🦄💦</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(160deg, #fde8f5 0%, #e8f4fd 40%, #f0eaff 75%, #fef9e0 100%);
      min-height: 100vh;
      color: #5a4a6a;
    }

    header {
      text-align: center;
      padding: 2.5rem 1.5rem 2rem;
    }

    .deco-top {
      font-size: 2.2rem;
      letter-spacing: 0.3rem;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 800;
      line-height: 1.2;
      background: linear-gradient(90deg, #f78fb3, #a29bfe, #74b9ff, #81ecec);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: #a07bbf;
      font-weight: 600;
      letter-spacing: 0.05rem;
    }

    /* Ort */
    .location {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin: 0.5rem auto 2rem;
      background: rgba(255, 255, 255, 0.65);
      border-radius: 2rem;
      padding: 0.6rem 1.4rem;
      width: fit-content;
      max-width: 90%;
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 700;
      color: #6c5ce7;
      box-shadow: 0 2px 12px rgba(162, 155, 254, 0.2);
    }

    /* Programm */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.2rem 3rem;
    }

    .section-label {
      text-align: center;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.12rem;
      text-transform: uppercase;
      color: #a07bbf;
      margin-bottom: 1.2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.72);
      border-radius: 1.4rem;
      padding: 1.4rem 0.8rem 1.2rem;
      text-align: center;
      box-shadow: 0 4px 18px rgba(120, 100, 200, 0.1);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(120, 100, 200, 0.18);
    }

    .card .icon {
      font-size: 2.2rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .card .label {
      font-size: 1rem;
      font-weight: 700;
      color: #6c5ce7;
    }

    /* Einladungs-Zeile */
    .invite {
      text-align: center;
      font-size: clamp(1.1rem, 3.5vw, 1.35rem);
      font-weight: 700;
      color: #b06ec4;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 2rem;
      padding: 1rem 1.5rem;
      box-shadow: 0 2px 12px rgba(200, 150, 220, 0.15);
    }

    footer {
      text-align: center;
      padding: 1.5rem 1rem 2rem;
      font-size: 0.85rem;
      color: #b0a0c8;
    }
  </style>
</head>
<body>

  <header>
    <div class="deco-top">🦄 🌈 💦</div>
    <h1>Alvas &amp; Lailas<br>Einhorn-Wasser-Sommerfest</h1>
    <p class="subtitle">Ein Fest voller Magie und Planschspaß</p>
  </header>

  <div class="location">
    📍 Pleikartsförster Hof
  </div>

  <main>
    <p class="section-label">Was uns erwartet</p>

    <div class="grid">
      <div class="card">
        <span class="icon">🔥</span>
        <span class="label">Grillen</span>
      </div>
      <div class="card">
        <span class="icon">⛱️</span>
        <span class="label">Sandeln</span>
      </div>
      <div class="card">
        <span class="icon">💨</span>
        <span class="label">Flitzen</span>
      </div>
      <div class="card">
        <span class="icon">🎨</span>
        <span class="label">Malen</span>
      </div>
      <div class="card">
        <span class="icon">💦</span>
        <span class="label">Planschen</span>
      </div>
    </div>

    <p class="invite">Wir freuen uns auf euch! 🌈</p>
  </main>

  <footer>
    Made with 💜 for Alva &amp; Laila
  </footer>

</body>
</html>
